  &lt;script&gt;
    (function(){
      const root=document.getElementById(&#x27;assignment-concepts&#x27;);
      const tabs=[...root.querySelectorAll(&#x27;[data-show]&#x27;)];
      tabs.forEach(tab=&gt;tab.addEventListener(&#x27;click&#x27;,()=&gt;{
        tabs.forEach(item=&gt;{const active=item===tab;item.classList.toggle(&#x27;btn-primary&#x27;,active);item.setAttribute(&#x27;aria-selected&#x27;,String(active));});
        root.querySelectorAll(&#x27;[data-concept]&#x27;).forEach(panel=&gt;panel.classList.toggle(&#x27;is-active&#x27;,panel.dataset.concept===tab.dataset.show));
      }));
      root.querySelectorAll(&#x27;.choice&#x27;).forEach(choice=&gt;choice.addEventListener(&#x27;click&#x27;,()=&gt;{root.querySelectorAll(&#x27;.choice&#x27;).forEach(item=&gt;item.classList.toggle(&#x27;is-selected&#x27;,item===choice));}));
      let step=0;
      const drawWizard=()=&gt;{root.querySelectorAll(&#x27;.wizard-page&#x27;).forEach((page,index)=&gt;page.classList.toggle(&#x27;is-current&#x27;,index===step));root.querySelectorAll(&#x27;.step&#x27;).forEach((item,index)=&gt;item.classList.toggle(&#x27;is-current&#x27;,index===step));root.querySelector(&#x27;#wizardBack&#x27;).disabled=step===0;root.querySelector(&#x27;#wizardNext&#x27;).textContent=step===3?&#x27;建立異動（示範）&#x27;:&#x27;下一步&#x27;;};
      root.querySelector(&#x27;#wizardBack&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{if(step&gt;0){step--;drawWizard();}});
      root.querySelector(&#x27;#wizardNext&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{if(step&lt;3){step++;drawWizard();}else{showMessage(&#x27;示範完成：已通過期間與必填檢查，沒有寫入資料。&#x27;);}});
      const chips=[...root.querySelectorAll(&#x27;[data-dealer-chip]&#x27;)];
      chips.forEach(chip=&gt;chip.addEventListener(&#x27;click&#x27;,()=&gt;{chip.classList.toggle(&#x27;is-moving&#x27;);chip.lastElementChild.textContent=chip.classList.contains(&#x27;is-moving&#x27;)?&#x27;移動 →&#x27;:&#x27;保留&#x27;;const count=chips.filter(item=&gt;item.classList.contains(&#x27;is-moving&#x27;)).length;root.querySelector(&#x27;#moveCount&#x27;).textContent=count+&#x27; 家&#x27;;root.querySelector(&#x27;.lane.target strong&#x27;).textContent=&#x27;接手後共 &#x27;+(8+count)+&#x27; 家&#x27;;root.querySelector(&#x27;.lane.target p&#x27;).textContent=&#x27;原有 8 家，加上本次 &#x27;+count+&#x27; 家&#x27;;}));
      const showMessage=text=&gt;{const message=root.querySelector(&#x27;#demoMessage&#x27;);message.textContent=text;message.hidden=false;};
      root.querySelectorAll(&#x27;[data-demo]&#x27;).forEach(button=&gt;button.addEventListener(&#x27;click&#x27;,()=&gt;showMessage(&#x27;檢查完成：生效時間銜接一致、沒有期間重疊，歷史銷售維持原歸屬。&#x27;)));

    })();
