<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#102a43">
  <title>LGSaleOut 業務回報</title>
  <style>
    :root { --navy:#102a43; --blue:#1677ff; --pale:#eef6ff; --ink:#172b3a; --muted:#6b7c8f; --line:#dbe5ee; --paper:#fff; --danger:#c5352a; }
    * { box-sizing:border-box; }
    html { background:#edf3f8; }
    body { margin:0; color:var(--ink); background:#edf3f8; font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; }
    button, select, input { font:inherit; }
    button { -webkit-tap-highlight-color:transparent; }
    .app { width:100%; max-width:480px; min-height:100dvh; margin:auto; background:#f7fafc; box-shadow:0 0 35px #16324f18; }
    header { padding:calc(18px + env(safe-area-inset-top)) 20px 19px; color:#fff; background:linear-gradient(145deg,#102a43,#174f78); }
    .eyebrow { margin:0 0 6px; color:#a9d6ff; font-size:12px; font-weight:800; letter-spacing:.13em; }
    h1 { margin:0; font-size:25px; letter-spacing:.01em; }
    header p { margin:7px 0 0; color:#d7e8f5; font-size:13px; }
    main { padding:18px 14px calc(30px + env(safe-area-inset-bottom)); }
    .card { margin-bottom:14px; padding:18px; background:var(--paper); border:1px solid var(--line); border-radius:18px; box-shadow:0 8px 25px #183b5610; }
    .section-title { display:flex; align-items:center; gap:10px; margin:0 0 16px; font-size:17px; }
    .badge { width:27px; height:27px; display:grid; place-items:center; color:#fff; background:var(--blue); border-radius:9px; font-size:13px; }
    label.field-label { display:block; margin:0 0 7px; color:#40566a; font-size:13px; font-weight:800; }
    select { width:100%; min-height:49px; padding:0 42px 0 13px; color:var(--ink); border:1px solid #bccbd8; border-radius:12px; background:#fff; }
    select:disabled { color:#8a9aaa; background:#f2f5f7; }
    .stack { display:grid; gap:15px; }
    .hint, .empty { color:var(--muted); font-size:13px; line-height:1.6; }
    .empty { padding:22px 12px; text-align:center; border:1px dashed #c6d4df; border-radius:12px; background:#f9fbfd; }
    .models { display:grid; gap:9px; }
    .model-row { display:grid; grid-template-columns:minmax(0,1fr) 86px; gap:10px; align-items:center; padding:11px 11px 11px 13px; background:#f7fafc; border:1px solid #e0e9f0; border-radius:12px; }
    .model-code { overflow-wrap:anywhere; font-weight:800; }
    .stock { margin-top:3px; color:var(--muted); font-size:11px; }
    .qty { width:100%; height:43px; padding:0 7px; text-align:center; border:1px solid #9eb3c4; border-radius:9px; background:#fff; }
    .photo-group { margin-top:13px; padding:13px; border:1px solid var(--line); border-radius:15px; background:#fbfdff; }
    .photo-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .photo-head strong { font-size:14px; }
    .photo-head select { width:128px; min-height:42px; }
    .photo-box { position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; display:grid; place-items:center; padding:0; border:2px dashed #b4c8d8; border-radius:14px; background:#edf4f9; cursor:pointer; }
    .photo-box:focus-visible { outline:3px solid #95c5ff; outline-offset:2px; }
    .photo-box img { width:100%; height:100%; display:none; object-fit:cover; }
    .photo-box.has-photo img { display:block; }
    .photo-box.has-photo .camera-copy { display:none; }
    .camera-copy { color:#557086; text-align:center; }
    .camera-icon { display:block; margin-bottom:8px; font-size:34px; }
    .camera-copy span:last-child { display:block; font-size:13px; font-weight:800; }
    .camera-modal { position:fixed; inset:0; z-index:20; display:grid; place-items:center; padding:16px; background:#071521ee; }
    .camera-panel { width:min(100%,520px); padding:16px; color:#fff; background:#102a43; border-radius:20px; box-shadow:0 20px 60px #0008; }
    .camera-title { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .camera-title h2 { margin:0; font-size:18px; }
    .camera-close { min-width:44px; min-height:44px; color:#fff; background:#ffffff18; border:1px solid #ffffff35; border-radius:12px; font-size:22px; }
    .camera-viewport { position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; background:#000; border:2px solid #8bc4ff; border-radius:16px; }
    .camera-viewport video { width:100%; height:100%; display:block; object-fit:cover; }
    .camera-guide { position:absolute; inset:10px; border:1px solid #ffffffaa; border-radius:10px; pointer-events:none; }
    .camera-status { min-height:22px; margin:10px 2px; color:#d7e8f5; font-size:13px; text-align:center; }
    .camera-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .camera-actions button { min-height:50px; border:0; border-radius:13px; font-weight:900; }
    .camera-secondary { color:#d7e8f5; background:#ffffff18; }
    .camera-primary { color:#fff; background:#1677ff; }
    .fake-submit { width:100%; min-height:54px; color:#fff; background:linear-gradient(135deg,#1677ff,#0d5bc0); border:0; border-radius:14px; font-size:16px; font-weight:900; box-shadow:0 9px 20px #1677ff38; }
    .toast { position:fixed; left:50%; bottom:calc(22px + env(safe-area-inset-bottom)); z-index:5; width:max-content; max-width:calc(100% - 32px); padding:11px 16px; color:#fff; background:#172b3a; border-radius:999px; font-size:13px; transform:translate(-50%,20px); opacity:0; pointer-events:none; transition:.2s; }
    .toast.show { transform:translate(-50%,0); opacity:1; }
    .error { color:var(--danger); }
    [hidden] { display:none !important; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <p class="eyebrow">LG SALES OUT</p>
      <h1>門市庫存回報</h1>
      <p>選擇客戶、填寫數量並拍攝現場照片</p>
    </header>
    <main>
      <section class="card" aria-labelledby="loginTitle">
        <h2 class="section-title" id="loginTitle"><span class="badge">1</span>業務登入</h2>
        <label class="field-label" for="salesperson">Salesperson 業務</label>
        <select id="salesperson"><option value="">資料載入中…</option></select>
        <p id="loginStatus" class="hint">請先選擇您的業務姓名</p>
      </section>

      <div id="reportPage" hidden>
        <section class="card" aria-labelledby="inventoryTitle">
          <h2 class="section-title" id="inventoryTitle"><span class="badge">2</span>Dealer 與庫存</h2>
          <div class="stack">
            <div>
              <label class="field-label" for="dealer">Dealer 經銷商</label>
              <select id="dealer" disabled><option value="">請選擇 Dealer</option></select>
            </div>
            <div>
              <label class="field-label">Product &gt; ModelCode／回報數量</label>
              <div id="models" class="models"><div class="empty">選擇 Dealer 後顯示 ModelCode</div></div>
            </div>
          </div>
        </section>

        <section class="card" aria-labelledby="photoTitle">
          <h2 class="section-title" id="photoTitle"><span class="badge">3</span>現場照片</h2>
          <p class="hint">每組選擇照片類型，再點選正方形區域拍照。</p>
          <div id="photoGroups"></div>
        </section>
        <button id="submit" class="fake-submit" type="button">寫入回報</button>
      </div>
    </main>
  </div>
  <div id="toast" class="toast" role="status"></div>
  <div id="cameraModal" class="camera-modal" role="dialog" aria-modal="true" aria-labelledby="cameraTitle" hidden>
    <div class="camera-panel">
      <div class="camera-title">
        <h2 id="cameraTitle">現場拍照</h2>
        <button id="cameraClose" class="camera-close" type="button" aria-label="關閉相機">×</button>
      </div>
      <div class="camera-viewport">
        <video id="cameraVideo" autoplay muted playsinline></video>
        <div class="camera-guide" aria-hidden="true"></div>
      </div>
      <p id="cameraStatus" class="camera-status">正在開啟後鏡頭…</p>
      <div class="camera-actions">
        <button id="cameraCancel" class="camera-secondary" type="button">取消</button>
        <button id="cameraCapture" class="camera-primary" type="button" disabled>拍照</button>
      </div>
      <canvas id="cameraCanvas" hidden></canvas>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const salesperson = $('salesperson');
    const dealer = $('dealer');

    function option(value, text) {
      const el = document.createElement('option');
      el.value = value; el.textContent = text;
      return el;
    }
    async function getJSON(url) {
      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok || !data.ok) throw new Error(data.message || '資料讀取失敗');
      return data.items;
    }
    function showToast(text) {
      $('toast').textContent = text;
      $('toast').classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => $('toast').classList.remove('show'), 2400);
    }
    async function loadSalespeople() {
      try {
        const items = await getJSON('/api/salespeople');
        salesperson.replaceChildren(option('', '請選擇業務'));
        items.forEach(item => salesperson.append(option(item.id, item.name)));
        $('loginStatus').textContent = items.length ? '選擇後將開啟回報頁面' : '目前沒有可用的業務資料';
      } catch (error) {
        salesperson.replaceChildren(option('', '無法載入業務'));
        $('loginStatus').textContent = error.message;
        $('loginStatus').classList.add('error');
      }
    }
    salesperson.addEventListener('change', async () => {
      $('reportPage').hidden = !salesperson.value;
      dealer.disabled = true;
      dealer.replaceChildren(option('', 'Dealer 載入中…'));
      $('models').innerHTML = '<div class="empty">選擇 Dealer 後顯示 ModelCode</div>';
      if (!salesperson.value) return;
      $('loginStatus').textContent = `已登入：${salesperson.selectedOptions[0].textContent}`;
      try {
        const items = await getJSON(`/api/dealers?salespersonId=${encodeURIComponent(salesperson.value)}`);
        dealer.replaceChildren(option('', '請選擇 Dealer'));
        items.forEach(item => dealer.append(option(item.id, `${item.name}｜${item.code}`)));
        dealer.disabled = false;
        $('reportPage').scrollIntoView({ behavior:'smooth', block:'start' });
      } catch (error) {
        dealer.replaceChildren(option('', '無法載入 Dealer'));
        showToast(error.message);
      }
    });
    dealer.addEventListener('change', async () => {
      const box = $('models');
      if (!dealer.value) { box.innerHTML = '<div class="empty">選擇 Dealer 後顯示 ModelCode</div>'; return; }
      box.innerHTML = '<div class="empty">庫存載入中…</div>';
      try {
        const items = await getJSON(`/api/models?salespersonId=${encodeURIComponent(salesperson.value)}&dealerId=${encodeURIComponent(dealer.value)}`);
        box.replaceChildren();
        if (!items.length) { box.innerHTML = '<div class="empty">此 Dealer 目前沒有庫存資料</div>'; return; }
        items.forEach(item => {
          const row = document.createElement('div');
          row.className = 'model-row';
          row.innerHTML = `<div><div class="model-code"></div><div class="stock"></div></div><input class="qty" type="number" min="0" step="1" inputmode="numeric" placeholder="數量" aria-label="回報數量">`;
          row.querySelector('.model-code').textContent = item.modelCode;
          row.querySelector('.stock').textContent = `現有庫存 ${item.currentQuantity}`;
          box.append(row);
        });
      } catch (error) { box.innerHTML = `<div class="empty error"></div>`; box.firstElementChild.textContent = error.message; }
    });

    const cameraModal = $('cameraModal');
    const cameraVideo = $('cameraVideo');
    const cameraCanvas = $('cameraCanvas');
    const cameraStatus = $('cameraStatus');
    const cameraCapture = $('cameraCapture');
    let cameraStream = null;
    let activePhotoGroup = null;

    function stopCamera() {
      if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
      cameraStream = null;
      cameraVideo.srcObject = null;
      cameraModal.hidden = true;
      cameraCapture.disabled = true;
      activePhotoGroup = null;
    }

    async function openCamera(group) {
      activePhotoGroup = group;
      cameraModal.hidden = false;
      cameraCapture.disabled = true;
      cameraStatus.textContent = '正在開啟後鏡頭…';
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal:'environment' },
            width: { ideal:1920 },
            height: { ideal:1440 }
          },
          audio:false
        });
        cameraVideo.srcObject = cameraStream;
        await cameraVideo.play();
        cameraCapture.disabled = false;
        cameraStatus.textContent = '請將拍攝內容放在正方形取景框內';
      } catch (error) {
        cameraStatus.textContent = location.protocol !== 'https:' && location.hostname !== 'localhost'
          ? '相機需要使用 HTTPS 網址才能開啟'
          : '無法開啟相機，請允許瀏覽器使用相機權限';
      }
    }

    cameraCapture.addEventListener('click', () => {
      if (!activePhotoGroup || !cameraVideo.videoWidth) return;
      const sourceWidth = cameraVideo.videoWidth;
      const sourceHeight = cameraVideo.videoHeight;
      const cropSize = Math.min(sourceWidth, sourceHeight);
      const outputSize = Math.min(1200, cropSize);
      cameraCanvas.width = outputSize;
      cameraCanvas.height = outputSize;
      cameraCanvas.getContext('2d').drawImage(
        cameraVideo,
        (sourceWidth - cropSize) / 2,
        (sourceHeight - cropSize) / 2,
        cropSize,
        cropSize,
        0,
        0,
        outputSize,
        outputSize
      );
      const group = activePhotoGroup;
      cameraCanvas.toBlob(blob => {
        if (!blob) return showToast('照片建立失敗，請重新拍攝');
        const image = group.querySelector('img');
        if (image.dataset.url) URL.revokeObjectURL(image.dataset.url);
        image.dataset.url = URL.createObjectURL(blob);
        image.src = image.dataset.url;
        group.photoBlob = blob;
        group.querySelector('.photo-box').classList.add('has-photo');
        stopCamera();
        showToast(`已拍攝 ${outputSize} × ${outputSize} 照片`);
      }, 'image/jpeg', 0.88);
    });

    $('cameraClose').addEventListener('click', stopCamera);
    $('cameraCancel').addEventListener('click', stopCamera);
    cameraModal.addEventListener('click', event => { if (event.target === cameraModal) stopCamera(); });

    for (let i = 1; i <= 3; i++) {
      const group = document.createElement('div');
      group.className = 'photo-group';
      group.innerHTML = `<div class="photo-head"><strong>照片 ${i}</strong><select aria-label="照片 ${i} 類型"><option>賣場</option><option>陳列</option><option>活動</option></select></div><button class="photo-box" type="button" aria-label="現場拍攝照片 ${i}"><img alt="照片 ${i} 預覽"><span class="camera-copy"><span class="camera-icon">📷</span><span>開啟相機拍照</span></span></button>`;
      const box = group.querySelector('.photo-box');
      box.addEventListener('click', () => openCamera(group));
      $('photoGroups').append(group);
    }
    $('submit').addEventListener('click', () => showToast('示範按鈕：資料尚未寫入'));
    loadSalespeople();
  </script>
</body>
</html>
